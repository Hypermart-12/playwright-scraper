name: Run Playwright Scraper
on:
  repository_dispatch:
    types: [run-scraper] # This matches 'event_type' from n8n
  workflow_dispatch:      # Allows you to also click the button manually

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Run Scraper
        run: node scrape.js
        env:
          # This grabs the URL from n8n's payload
          TARGET_URL: ${{ github.event.client_payload.url || 'https://example.com' }}
          # This grabs your Secret from GitHub settings
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
