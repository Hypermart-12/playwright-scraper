name: Run Playwright Scraper

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Target URL to scrape"
        required: true
        type: string
      resumeUrl:
        description: "n8n resume webhook (auto injected)"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          TARGET_URL: ${{ inputs.url }}
        run: |
          echo "Scraping URL: $TARGET_URL"
          node scrape.js

      - name: Commit and push results
        run: |
          git config user.name "Scraper Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json || true
          git commit -m "Update scrape results $(date -u)" || echo "No changes to commit"
          git push

      # 👇 THIS IS REQUIRED FOR "Dispatch and Wait for Completion"
      - name: Resume n8n workflow
        if: always()
        run: |
          if [ -n "${{ inputs.resumeUrl }}" ]; then
            curl -X POST "${{ inputs.resumeUrl }}"
          else
            echo "No resumeUrl provided"
          fi
