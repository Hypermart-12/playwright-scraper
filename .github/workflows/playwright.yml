name: Run Playwright Scraper

on:
  repository_dispatch:
    types: [run-scraper]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          TARGET_URL: ${{ github.event.client_payload.url }}
        run: |
          echo "Scraping URL: $TARGET_URL"
          node scrape.js

      - name: Commit & push results
        run: |
          git config user.name "Scraper Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json || true
          git commit -m "Update scrape results $(date -u)" || echo "No changes"
          git push

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-error
          path: error-screenshot.png
